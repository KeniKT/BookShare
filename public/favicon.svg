       L16 9.5Z"
    fill="white" opacity="0.95"/>
  <path
    d="M16 9.5
       C17.5 8.8 19.2 8.5 21 8.5
       C22.8 8.5 24.5 8.8 26 9.5
       L26 22.5
       C24.5 21.8 22.8 21.5 21 21.5
       C19.2 21.5 17.5 21.8 16 22.5
       L16 9.5Z"
    fill="white" opacity="0.75"/>
  <!-- Spine line -->
  <line x1="16" y1="9.5" x2="16" y2="22.5" stroke="#0291B5" stroke-width="1" opacity="0.6"/>
  <!-- Page lines left -->
  <line x1="8.5" y1="13" x2="14" y2="13.5" stroke="#066886" stroke-width="0.8" opacity="0.5"/>
  <line x1="8.5" y1="16" x2="14" y2="16.5" stroke="#066886" stroke-width="0.8" opacity="0.5"/>
  <line x1="8.5" y1="19" x2="14" y2="19.5" stroke="#066886" stroke-width="0.8" opacity="0.5"/>
  <!-- Page lines right -->
  <line x1="18" y1="13.5" x2="23.5" y2="13" stroke="#0291B5" stroke-width="0.8" opacity="0.35"/>
  <line x1="18" y1="16.5" x2="23.5" y2="16" stroke="#0291B5" stroke-width="0.8" opacity="0.35"/>
  <line x1="18" y1="19.5" x2="23.5" y2="19" stroke="#0291B5" stroke-width="0.8" opacity="0.35"/>
</svg>
